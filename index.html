<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Document</title>
    <style>
        *{
  padding: 0;
  margin: 0;
  box-sizing: border-box;
}
a{
  text-decoration: none;
  font-weight: bold;
  font-family: sans-serif;
  background-color: rgb(197, 194, 209);
  padding: 0.5em 1em;
  border-radius: 8px;
}
.container{
  display: grid;
  grid-template-columns: repeat(12, [colonn] 1fr);
  gap: 5px;
}
.container > *{
  padding: 1em;
  background-color:  rgba(4, 146, 35, 0.164);
  grid-column: colonn / span 12;
}
h2, p{
  font-family: sans-serif;
  text-align: center;
}
p{
  font-family: sans-serif;
  margin-top: 5px;
}
.navheader{
  display: grid;
  grid-template-columns: 1fr; /* default: an blòk */
  gap: 0.50em;
  margin-top: 0.8em;
  text-align: center;
}
@media (min-width: 500px){
  .navheader{
    grid-template-columns: repeat(3, 1fr); /* 3 kolòn egal */
  }
}
.ko_a{
  display: grid;
  grid-column: colonn 4 / span 6;
  gap: 1em;
  min-width: 250px;
  min-height: 350px;
}

.tetContni, .fom_sa{
  align-items: center;
}
.fomsa{
  display: grid;
  grid-template-columns: 1fr; /* default: an blòk */
  gap: 10px;
}

#input{
  position: relative;
  padding: 0;
  width: 100%;
}
.field{
  width: 100%;
  border: none;
  font-size: 1.5em;
  padding: 15px 0 0 0;
  background: transparent;
}
.label{
  position: relative;
  display: block; /* 🔥 kle a */
  width: 100%;
}
.label-content{
  position: absolute;
  display: block;
  font-size: 1.2em;
  font-weight: bold;
  font-size: 1.2em;
  font-family: sans-serif;
  color: rgb(76, 136, 102);
  -webkit-transition: -webkit-transform 0.3s;
  transition: transform 0.3s color 0.3s;
  bottom: 0;
}
.field:focus{
  outline: none;
}
.label::before, .label::after{
  position: absolute;
  display: block;
  content: '';
  width: 100%;
  height: 2px;
  background-color: rgb(15, 4, 58);
  transition: transform 0.3s;
}
.label::before{
  background-color: rgba(139, 141, 139, 0.336);
  height: 1px;
  
}
.label::after{
  background-color: rgb(233, 54, 22);
  height: 3px;
  transform: scaleX(0);
  transform-origin: left;
}
.field:focus + .label .label-content,
.input--filled .label .label-content{
  transform: translateY(-150%) scale(0.75);
  color: rgba(70, 73, 117, 0.651);
}
.field:focus + .label::after,
.input--filled .label::after{
  transform: scale(1);
  color: rgba(70, 73, 117, 0.651);
}
    </style>
</head>
<body>
    
<div class="container">
  <header class="antet">
    <h2>Byenvini sou LOGO</h2>
    <p class="para"> Sa se jis yon ti eseyaj pou nou we kote nou ye</p>
    <nav class="navheader">
      <a href="#akey">Akey</a>
      <a href="#dekouvri">dekouvri</a>
      <a href="#kontak">kontak</a>
    </nav>
  </header>
  
  <div class="ko_a">
    <h2 id="tetContni">Fomile Pratik</h2>
    <form action="fom_sa" class="fomsa">
      <div id="input" class="input1">
        <input type="text" class="field field1" id="i1" />
        <label for="i1" class="label label1">
          <span class="label-content label-conten1">Siyati</span>
        </label>
      </div>
      <div id="input" class="input2">
        <input type="text" class="field field2" id="i2" />
        <label for="i2" class="label label2">
          <span class="label-content label-content2">Adres</span>
        </label>
      </div>
      <div id="input" class="input3">
        <input type="email" class="field field3" id="i3" />
        <label for="i3" class="label label3">
          <span class="label-content label-content3">Imel</span>
        </label>
        <p id="emailError"></p>
      </div>
    </form>    
  </div>
  <div class="footer"><span>Copyright 2026</span></div>
</div> 
<script src="script.js"></script>
</body>
</html>
